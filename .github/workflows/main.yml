name: Restful Booker API Tests

on:
  push:
    branches:
      - main

  # Runs full regression suite every day at 9:00 AM UTC
  schedule:
    - cron: '0 9 * * *'

  # Trigger manually via GitHub UI
  workflow_dispatch:

env:
  ENV: ${{ vars.ENV || 'dev' }}
  DEV_URL: ${{ vars.DEV_URL || 'https://restful-booker.herokuapp.com/' }}
  STAGING_URL: ${{ vars.STAGING_URL }}
  PROD_URL: ${{ vars.PROD_URL }}
  AUTH_TYPE: ${{ vars.AUTH_TYPE || 'basic' }}
  API_USERNAME: ${{ secrets.API_USERNAME }}
  API_PASSWORD: ${{ secrets.API_PASSWORD }}
  # OAuth — set these secrets if AUTH_TYPE=oauth
  TOKEN_URL: ${{ secrets.TOKEN_URL }}
  CLIENT_ID: ${{ secrets.CLIENT_ID }}
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  # API Key — set these if AUTH_TYPE=api_key
  API_KEY: ${{ secrets.API_KEY }}
  API_KEY_HEADER: ${{ vars.API_KEY_HEADER || 'x-api-key' }}

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        run: robot -d results --include smoke api/tests/examples
        continue-on-error: true

      - name: Retry failed smoke tests
        run: robot -d results/rerun --rerunfailed results/output.xml --include smoke api/tests/examples
        continue-on-error: true

      - name: Merge results
        run: rebot --merge -d results results/output.xml results/rerun/output.xml
        continue-on-error: true

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: results/

  regression:
    name: Regression Tests (Parallel)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regression tests in parallel
        run: pabot --processes 4 -d results --include regression api/tests/examples
        continue-on-error: true

      - name: Retry failed regression tests
        run: pabot --processes 4 -d results/rerun --rerunfailed results/output.xml --include regression api/tests/examples
        continue-on-error: true

      - name: Merge results
        run: rebot --merge -d results results/output.xml results/rerun/output.xml
        continue-on-error: true

      - name: Upload regression test results
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: results/
